<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content})}"
>
  <div th:fragment="content" class="container my-4">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
          <div
            class="card-header text-white"
            th:classappend="${food.id == null} ? ' bg-primary' : ' bg-warning'"
          >
            <h3
              class="mb-0"
              th:text="${food.id == null} ? '음식 등록' : '음식 수정'"
            ></h3>
          </div>

          <div class="card-body">
            <form
              th:action="${food.id == null} ? @{/food/create} : @{/food/edit}"
              method="post"
              th:object="${food}"
            >
              <!-- 수정 모드일 때 id 같이 전송 -->
              <input
                type="hidden"
                th:if="${food.id != null}"
                th:field="*{id}"
              />

              <div class="mb-3">
                <label for="name" class="form-label">음식 이름</label>
                <input
                  type="text"
                  id="name"
                  class="form-control"
                  th:field="*{name}"
                  placeholder="음식 이름을 입력하세요"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="category" class="form-label">카테고리</label>
                <select
                  id="category"
                  class="form-select"
                  th:field="*{category}"
                  required
                >
                  <option value="">카테고리 선택</option>
                  <option value="한식">한식</option>
                  <option value="일식">일식</option>
                  <option value="중식">중식</option>
                  <option value="양식">양식</option>
                  <option value="분식">분식</option>
                  <option value="디저트">디저트</option>
                  <option value="기타">기타</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="rating" class="form-label">평점</label>
                <select
                  id="rating"
                  class="form-select"
                  th:field="*{rating}"
                  required
                >
                  <option value="">평점 선택</option>
                  <option value="1">1점</option>
                  <option value="2">2점</option>
                  <option value="3">3점</option>
                  <option value="4">4점</option>
                  <option value="5">5점</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="eatDate" class="form-label">먹은 날짜</label>
                <input
                  type="date"
                  id="eatDate"
                  class="form-control"
                  th:field="*{eatDate}"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="memo" class="form-label">메모</label>
                <textarea
                  id="memo"
                  class="form-control"
                  th:field="*{memo}"
                  rows="4"
                  placeholder="음식에 대한 품평을 입력하세요"
                ></textarea>
              </div>

              <div class="d-flex justify-content-between">
                <a th:href="@{/food/list}" class="btn btn-sm btn-secondary">
                  <i class="bi bi-list"></i> 목록</a
                >

                <button
                  type="submit"
                  class="btn btn-sm"
                  th:classappend="${food.id == null} ? ' btn-primary' : ' btn-warning'"
                >
                  <i
                    th:class="${food.id == null} ? 'bi bi-plus-lg me-1' : 'bi bi-pencil'"
                  ></i>
                  <span th:text="${food.id == null} ? '등록' : '수정'"></span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</html>
