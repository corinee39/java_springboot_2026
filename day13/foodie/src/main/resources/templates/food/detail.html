<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content})}"
>
  <div th:fragment="content" class="container my-4">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
          <div class="card-header bg-dark text-white">
            <h3 class="mb-0">음식 상세</h3>
          </div>

          <div class="card-body">
            <div class="mb-3">
              <strong>ID :</strong>
              <span th:text="${food.id}"></span>
            </div>

            <div class="mb-3">
              <strong>이름 :</strong>
              <span th:text="${food.name}"></span>
            </div>

            <div class="mb-3">
              <strong>카테고리 :</strong>
              <span th:text="${food.category}"></span>
            </div>

            <div class="mb-3">
              <strong>평점 :</strong>
              <span th:each="i : ${#numbers.sequence(1, food.rating)}">⭐</span>
            </div>

            <div class="mb-3">
              <strong>먹은 날짜 :</strong>
              <span
                th:text="${#temporals.format(food.eatDate, 'yyyy-MM-dd HH:mm')}"
              ></span>
            </div>

            <div class="mb-3">
              <strong>작성일 :</strong>
              <span
                th:text="${#temporals.format(food.createdAt, 'yyyy-MM-dd HH:mm')}"
              ></span>
            </div>

            <div class="mb-3">
              <strong>메모 :</strong>
              <div
                class="border rounded p-2 mt-1 bg-light"
                th:text="${food.memo}"
              ></div>
            </div>

            <div class="d-flex justify-content-between mt-4">
              <a th:href="@{/food/list}" class="btn btn-sm btn-secondary">
                <i class="bi bi-list"></i> 목록
              </a>

              <div>
                <a
                  th:href="@{|/food/edit/${food.id}|}"
                  class="btn btn-sm btn-warning me-2"
                >
                  <i class="bi bi-pencil"></i> 수정
                </a>
                <a
                  th:href="@{|/food/delete/${food.id}|}"
                  class="btn btn-sm btn-danger"
                  onclick="return confirm('삭제하시겠습니까?');"
                >
                  <i class="bi bi-trash-fill"></i> 삭제
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</html>
