<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content})}"
>
  <div th:fragment="content" class="container my-3">
    <div class="row">
      <div class="col">
        <h4
          class="my-3 pb-2"
          th:text="${productId == null ? '상품 등록' : '상품 수정'}"
        ></h4>

        <!-- 한 화면에서 두가지 기능 create/modify 처리하려면 아래와 같이 삼항연산자 사용 -->
        <form
          th:action="${productId} == null
                    ? @{/product/create}
                    : @{|/product/modify/${productId}|}"
          th:object="${productForm}"
          method="post"
        >
          <!-- 입력 검증이 실패하면 경고창을 띄우기 -->
          <div
            class="alert alert-danger"
            role="alert"
            th:if="${#fields.hasAnyErrors()}"
          >
            <div
              th:each="error : ${#fields.allErrors()}"
              th:text="${error}"
            ></div>
          </div>
          <!-- 상품명 입력 영역 -->
          <div class="mb-3">
            <label for="productName" class="form-label">상품명</label>
            <input
              type="text"
              id="productName"
              th:field="*{productName}"
              class="form-control"
              placeholder="상품명을 입력하세요"
            />
            <div
              class="text-danger small"
              th:if="${#fields.hasErrors('productName')}"
              th:errors="*{productName}"
            ></div>
          </div>

          <!-- 상품 카테고리 입력 영역 -->
          <div class="mb-3">
            <label for="category" class="form-label">상품 카테고리</label>
            <input
              type="text"
              id="category"
              th:field="*{category}"
              class="form-control"
              placeholder="카테고리를 입력하세요"
            />
            <div
              class="text-danger small"
              th:if="${#fields.hasErrors('category')}"
              th:errors="*{category}"
            ></div>
          </div>

          <!-- 가격 입력 영역 -->
          <div class="mb-3">
            <label for="price" class="form-label">상품 가격</label>
            <input
              type="number"
              id="price"
              th:field="*{price}"
              class="form-control"
              placeholder="가격을 입력하세요"
            />
            <div
              class="text-danger small"
              th:if="${#fields.hasErrors('price')}"
              th:errors="*{price}"
            ></div>
          </div>

          <!-- 상품 설명 입력 영역 -->
          <div class="mb-3">
            <label for="description" class="form-label">상품 설명</label>
            <textarea
              id="description"
              th:field="*{description}"
              class="form-control"
              rows="5"
              placeholder="상품 설명을 입력하세요"
            ></textarea>
            <div
              class="text-danger small"
              th:if="${#fields.hasErrors('description')}"
              th:errors="*{description}"
            ></div>
          </div>

          <div class="text-end">
            <button type="submit" class="btn btn-sm btn-primary">
              <i class="bi bi-floppy"></i>
              <span th:text="${productId == null ? '등록' : '수정'}"></span>
            </button>
            <a th:href="@{/product/list}" class="btn btn-sm btn-secondary"
              ><i class="bi bi-list"></i> 리스트</a
            >
          </div>
        </form>
      </div>
    </div>
  </div>
</html>
