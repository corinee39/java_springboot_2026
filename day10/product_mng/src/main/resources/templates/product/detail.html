<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content})}"
>
  <div th:fragment="content" class="container my-3">
    <div class="row">
      <div class="col">
        <!-- 상품 상세 영역 -->
        <div class="card my-3 shadow-sm">
          <div class="card-body">
            <!-- 상품 요소 위치 -->
            <h4 th:text="${product.productName}" class="card-title"></h4>

            <div class="mb-2">
              <strong>카테고리</strong>
              <p th:text="${product.category}" class="card-text"></p>
            </div>

            <div class="mb-2">
              <strong>가격</strong>
              <p th:text="${product.price}" class="card-text"></p>
            </div>

            <div class="mb-2">
              <strong>상품 설명</strong>
              <p th:text="${product.description}" class="card-text"></p>
            </div>

            <div class="d-flex justify-content-end">
              <div class="badge bg-light text-dark p-2 text-start">
                <div>
                  등록일 :
                  <span
                    th:text="${product.createdAt != null ? #temporals.format(product.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"
                  ></span>
                </div>
                <div>
                  수정일 :
                  <span
                    th:text="${product.updatedAt != null ? #temporals.format(product.updatedAt, 'yyyy-MM-dd HH:mm') : '-'}"
                  ></span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 상품 목록 링크 -->
        <div class="text-end">
          <a
            th:href="@{|/product/modify/${product.productId}|}"
            class="btn btn-sm btn-warning"
          >
            <i class="bi bi-pencil"></i>
            수정
          </a>

          <!-- 삭제 버튼 -->
          <!-- <a
            th:href="@{|/product/delete/${product.productId}|}"
            class="btn btn-sm btn-danger"
          >
            <i class="bi bi-trash-fill"></i>삭제
          </a> -->

          <form
            id="deleteForm"
            th:action="@{|/product/delete/${product.productId}|}"
            method="post"
            style="display: inline"
          >
            <button
              type="button"
              class="btn btn-sm btn-danger"
              data-bs-toggle="modal"
              data-bs-target="#deleteModal"
            >
              <i class="bi bi-trash-fill"></i>
              삭제
            </button>
          </form>

          <a href="/product/list" class="btn btn-sm btn-secondary">
            <i class="bi bi-list"></i> 리스트
          </a>

          <!-- 이 태그는 버튼 누를시에만 표시 -->
          <!-- 삭제 확인 모달 -->
          <div
            class="modal fade"
            id="deleteModal"
            tabindex="-1"
            aria-labelledby="deleteModalLabel"
            aria-hidden="true"
          >
            <div class="modal-dialog">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title" id="deleteModalLabel">삭제 확인</h5>
                  <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                    aria-label="Close"
                  ></button>
                </div>

                <div class="modal-body">삭제하시겠습니까?</div>

                <div class="modal-footer">
                  <button
                    type="button"
                    class="btn btn-sm btn-danger"
                    id="confirmDeleteBtn"
                  >
                    예
                  </button>

                  <button
                    type="button"
                    class="btn btn-sm btn-secondary"
                    data-bs-dismiss="modal"
                  >
                    아니오
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- 자바스크립트 영역 -->
          <script>
            // confirmDeleteBtn '예'를 클릭하면
            // 전체 페이지에서 deleteForm 아이디 폼태그를 찾아서 submit을 발동
            document
              .getElementById("confirmDeleteBtn")
              .addEventListener("click", function () {
                document.getElementById("deleteForm").submit();
              });
          </script>
        </div>
      </div>
    </div>
  </div>
</html>
